<nav class="pv3 ph3 ph4-ns" role="navigation">
  <div class="flex-l justify-between items-center center">
    <a
      href="{{ .Site.Home.RelPermalink }}"
      class="f3 fw2 no-underline dib"
      style="color: var(--text-inverse);"
    >
      {{ with .Site.Params.site_logo }}
        <img
          src="{{ relURL . }}"
          class="site-logo"
          alt="{{ $.Site.Title }}"
        />
      {{ else }}
        {{ .Site.Title }}
      {{ end }}
    </a>

    <div class="flex-l items-center">
      {{ partial "i18nlist.html" . }}

      {{ if .Site.Menus.main }}
        <ul class="{{ cond (eq $.Site.Language.LanguageDirection "rtl") "pr0 ml3" "pl0 mr3" }}">
          {{ $currentPage := . }}

          {{ range .Site.Menus.main }}
            <li class="list f5 f4-ns fw4 dib pv2 {{ cond (eq $.Site.Language.LanguageDirection "rtl") "pl3" "pr3" }}">
              <a
                href="{{ .URL }}"
                title="{{ i18n "pageTitle" . }}"
                class="no-underline {{ if $currentPage.IsMenuCurrent "main" . }}is-active{{ end }} {{ .Params.class }}"
                style="color: var(--text-inverse);"
              >
                {{ .Name }}
              </a>
            </li>
          {{ end }}
        </ul>
      {{ end }}

      {{ partialCached "social-follow.html" . }}
    </div>
  </div>
</nav>
