{{ $.Scratch.Add "labelClasses" "f6 b db mb1 mt3 sans-serif section-label" }}
{{ $.Scratch.Add "inputClasses" "w-100 f5 pv3 ph3 bn" }}

<form
  class="content-body sans-serif"
  accept-charset="UTF-8"
  action="{{ .Get "action" }}"
  method="POST"
  role="form"
>

  <label class="{{ $.Scratch.Get "labelClasses" }}" for="name">
    {{ i18n "yourName" }}
  </label>
  <input
    type="text"
    id="name"
    name="name"
    class="{{ $.Scratch.Get "inputClasses" }}"
    required
    placeholder=" "
    aria-labelledby="name"
  />

  <label class="{{ $.Scratch.Get "labelClasses" }}" for="email">
    {{ i18n "emailAddress" }}
  </label>
  <input
    type="email"
    id="email"
    name="email"
    class="{{ $.Scratch.Get "inputClasses" }}"
    required
    placeholder=" "
    aria-labelledby="email"
  />

  <div class="f6 content-body ph3 overflow-hidden mt1 mb3">
    {{ i18n "emailRequiredNote" }}
  </div>

  <label class="{{ $.Scratch.Get "labelClasses" }}" for="message">
    {{ i18n "message" }}
  </label>
  <textarea
    id="message"
    name="message"
    class="{{ $.Scratch.Get "inputClasses" }} h4"
    aria-labelledby="message"
  ></textarea>

  <input
    class="button primary db w-100 mv2 pa3 bn bg-animate"
    type="submit"
    value="{{ i18n "send" }}"
  />

</form>
