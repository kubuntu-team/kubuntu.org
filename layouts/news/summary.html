<div class="mb3 pa4 card-inner overflow-hidden">
  {{ if .Date }}
  <div class="f6 section-label">
    {{ .Date | time.Format (default "January 2, 2006" .Site.Params.date_format)
    }}
  </div>
  {{ end }}

  <h1 class="f3 card-title">
    <a href="{{ .RelPermalink }}" class="card-link dim"> {{ .Title }} </a>
  </h1>

  <div class="nested-links f5 lh-copy nested-copy-line-height">
    {{ .Summary | plainify }}
  </div>

  <a
    href="{{.RelPermalink}}"
    class="card-button ba br2 dib f7 link mt2 ph2 pv1"
  >
    {{ $.Param "read_more_copy" | default (i18n "readMore") }}
  </a>
</div>
